services:

  # ─────────────────────────────────────────────────────────────────
  # Fix volume ownership so ziggy (uid 2171) can write to it.
  # Runs once before the controller starts (official pattern).
  # ─────────────────────────────────────────────────────────────────
  chown-controller:
    image: busybox
    command: chown -R 2171 /ziti-controller
    volumes:
      - ziti-controller:/ziti-controller

  # ─────────────────────────────────────────────────────────────────
  # OpenZiti Controller
  # Runs in single-node cluster mode (always, by design).
  # Bootstrap creates a SPIFFE-aware PKI, config and DB on first run.
  # ZITI_AUTO_RENEW_CERTS=true renews leaf certs on every restart.
  # ─────────────────────────────────────────────────────────────────
  ziti-controller:
    image: openziti/ziti-controller:latest
    depends_on:
      chown-controller:
        condition: service_completed_successfully
    env_file:
      - ./.env
    environment:
      ZITI_CTRL_ADVERTISED_ADDRESS: ${ZITI_CTRL_ADVERTISED_ADDRESS}
      ZITI_CTRL_ADVERTISED_PORT:    ${ZITI_CTRL_ADVERTISED_PORT:-38440}
      ZITI_USER:                    ${ZITI_USER:-admin}
      ZITI_PWD:                     ${ZITI_PWD}
      ZITI_EDGE_IDENTITY_ENROLLMENT_DURATION: ${ZITI_EDGE_IDENTITY_ENROLLMENT_DURATION:-10080}
      ZITI_ROUTER_ENROLLMENT_DURATION:        ${ZITI_ROUTER_ENROLLMENT_DURATION:-10080}
    ports:
      - ${ZITI_INTERFACE:-0.0.0.0}:${ZITI_CTRL_ADVERTISED_PORT:-38440}:${ZITI_CTRL_ADVERTISED_PORT:-38440}
    volumes:
      - ziti-controller:/ziti-controller
    networks:
      ziti:
        aliases:
          - ziti-controller
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ziti", "agent", "stats"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # OpenZiti Edge Router
  # First run: requires ZITI_ENROLL_TOKEN in .env (JWT from ZAC).
  # Subsequent starts: detects existing enrollment and skips the token.
  # ZITI_AUTO_RENEW_CERTS=true renews certs on every restart.
  # ─────────────────────────────────────────────────────────────────
  ziti-router:
    image: openziti/ziti-router:latest
    depends_on:
      ziti-controller:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      ZITI_CTRL_ADVERTISED_ADDRESS:   ${ZITI_CTRL_ADVERTISED_ADDRESS}
      ZITI_CTRL_ADVERTISED_PORT:      ${ZITI_CTRL_ADVERTISED_PORT:-38440}
      ZITI_ROUTER_ADVERTISED_ADDRESS: ${ZITI_ROUTER_ADVERTISED_ADDRESS}
      ZITI_ROUTER_PORT:               ${ZITI_ROUTER_PORT:-38442}
      ZITI_ENROLL_TOKEN:              ${ZITI_ENROLL_TOKEN:-}
      ZITI_ROUTER_TYPE:               edge
      ZITI_ROUTER_MODE:               host
    ports:
      - ${ZITI_INTERFACE:-0.0.0.0}:${ZITI_ROUTER_PORT:-38442}:${ZITI_ROUTER_PORT:-38442}
    volumes:
      - ziti-router:/ziti-router
    networks:
      - ziti
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ziti", "agent", "stats"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Web console (ZAC) — served over internal HTTP, Caddy handles TLS
  # ─────────────────────────────────────────────────────────────────
  ziti-console:
    env_file:
      - ./.env
    image: openziti/zac:latest
    depends_on:
      ziti-controller:
        condition: service_healthy
    environment:
      PORT:                              "8080"
      ZAC_CONTROLLER_URLS:               ${ZAC_CONTROLLER_URLS}
    networks:
      - ziti
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # Caddy — reverse proxy with Let's Encrypt TLS
  # ─────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2
    depends_on:
      - ziti-console
    env_file:
      - ./.env
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ziti
    restart: unless-stopped

networks:
  ziti:

volumes:
  ziti-controller:
  ziti-router:
  caddy-data:
  caddy-config: